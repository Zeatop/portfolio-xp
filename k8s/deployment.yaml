apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-xp
  labels:
    app: portfolio-xp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-xp
  template:
    metadata:
      labels:
        app: portfolio-xp
    spec:
      containers:
        - name: portfolio-xp
          image: 10.0.0.10:5000/portfolio-xp:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-xp
spec:
  type: NodePort
  selector:
    app: portfolio-xp
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081