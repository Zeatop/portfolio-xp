<!DOCTYPE html>
<html lang="en" data-theme="XP">
<head>
  <meta charset="UTF-8"/>
  <meta content="width=device-width, initial-scale=1.0, shrink-to-fit=no, user-scalable=no" name="viewport"/>
  <title>Minesweeper XP</title>

  <style>
    .window { display: contents !important; border: none !important; box-shadow: none !important; border-radius: 0 !important; }
    .title-bar { display: none !important; }
    .window-body { margin: 0 !important; padding: 0 !important; overflow: hidden; }
    body, #root { margin: 0; padding: 0; height: 100%; overflow: hidden; background: rgb(192, 192, 192); }
  </style>

  <script>
    window.runtime = {
      Quit: function() {},
      WindowMinimise: function() {},
      BrowserOpenURL: function(url) { window.open(url, '_blank') },
      WindowSetSize: function() {}
    }

    window.addEventListener('load', function() {
      var attempts = 0
      var interval = setInterval(function() {
        attempts++
        var content = document.querySelector('.mine__content')
        var topBar  = document.querySelector('.mine__top-bar')
        if (content && topBar) {
          clearInterval(interval)
          function sendSize() {
            var w = content.offsetWidth
            var h = content.offsetHeight + topBar.offsetHeight
            window.parent.postMessage({ type: 'minesweeper-resize', width: w, height: h }, '*')
          }
          sendSize()
          var observer = new ResizeObserver(sendSize)
          observer.observe(content)
          observer.observe(topBar)
        }
        if (attempts > 50) clearInterval(interval)
      }, 100)
    })
  </script>

  <script type="module" crossorigin src="/Minesweeper-XP/assets/index.598ae11f.js"></script>
  <link rel="stylesheet" href="/Minesweeper-XP/assets/index.e1336d0d.css">
</head>
<body>
  <div id="root"></div>
</body>
</html>
